services:
  mysql:
    image: mysql:8
    container_name: orderfood-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: orderfood
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s
    restart: unless-stopped
    networks:
      - orderfood-net

  app:
    build:
      context: .
      args:
        DESCRIPTION: "Build a mini food ordering app"
    container_name: orderfood-api
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_ENV: development
      PORT: 8080
      API_KEY: apitest
      MYSQL_DSN: root:root@tcp(mysql:3306)/orderfood?parseTime=true&charset=utf8mb4,utf8
      COUPON_FILES: /app/data/couponbase1.txt,/app/data/couponbase2.txt,/app/data/couponbase3.txt
      # Optional indexed mode (supports hot-reload without app restart):
      # COUPON_INDEX_FILE: /app/data/coupons.idx
      # COUPON_INDEX_RELOAD_INTERVAL: 5s
    volumes:
      - ./data:/app/data
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - orderfood-net

volumes:
  mysql_data:

networks:
  orderfood-net:
    driver: bridge
