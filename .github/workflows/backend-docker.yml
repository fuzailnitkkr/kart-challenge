name: Backend Docker Package

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - 'backend-challenge/**'
      - '.github/workflows/backend-docker.yml'

permissions:
  contents: read
  packages: write

jobs:
  docker-package:
    name: Build and Publish Docker Package
    runs-on: ubuntu-latest
    env:
      IS_SAME_REPO_PR: ${{ github.event.pull_request.head.repo.full_name == github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare image tags
        id: prep
        shell: bash
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/kart-challenge-backend"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "pr_tag=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: env.IS_SAME_REPO_PR == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push package image
        if: env.IS_SAME_REPO_PR == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./backend-challenge
          push: true
          tags: |
            ${{ steps.prep.outputs.image }}:${{ steps.prep.outputs.pr_tag }}
            ${{ steps.prep.outputs.image }}:${{ steps.prep.outputs.pr_tag }}-${{ steps.prep.outputs.sha_tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build only for fork PRs
        if: env.IS_SAME_REPO_PR != 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./backend-challenge
          push: false
          tags: |
            ${{ steps.prep.outputs.image }}:${{ steps.prep.outputs.pr_tag }}

      - name: Publish summary
        shell: bash
        run: |
          echo "Image: \`${{ steps.prep.outputs.image }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "PR tag: \`${{ steps.prep.outputs.pr_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ "${IS_SAME_REPO_PR}" = "true" ]; then
            echo "Publish: yes" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Publish: no (fork PR token restrictions)" >> "$GITHUB_STEP_SUMMARY"
          fi
